aid: elk
name: Elk
description: >-
  Elk is a nimble Mastodon web client that provides a modern interface for
  interacting with the Mastodon and Fediverse social network. It supports
  standard Mastodon API endpoints for social networking, timelines, notifications,
  and account management.
